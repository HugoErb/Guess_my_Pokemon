<div class="min-h-screen bg-slate-900 text-white flex flex-col">
	<app-header [icon]="ICONS.guess" iconClass="text-red-400" title="Guess my Pokémon" />

	<!-- Main content -->
	<main class="flex-1 flex items-center justify-center px-4">
		<!-- Loading -->
		@if (state === "loading") {
			<div class="flex flex-col items-center gap-4 text-slate-400">
				<iconify-icon [icon]="ICONS.loading" class="text-4xl animate-spin"></iconify-icon>
				<p>Chargement de l'invitation…</p>
			</div>
		}

		<!-- Error / Full -->
		@if (state === "error" || state === "full") {
			<div class="w-full max-w-md bg-slate-800 border border-slate-700 rounded-2xl p-8 shadow-xl text-center">
				<iconify-icon [icon]="ICONS.alert" class="text-5xl text-red-500 mx-auto"></iconify-icon>
				<p class="text-slate-300 text-lg">{{ errorMessage }}</p>
				<button
					(click)="decline()"
					class="mt-6 px-6 py-2 rounded-xl border border-slate-600 text-slate-300 hover:bg-slate-700 hover:text-white transition-colors text-sm font-medium"
				>
					Retour à l'accueil
				</button>
			</div>
		}
	</main>
</div>
