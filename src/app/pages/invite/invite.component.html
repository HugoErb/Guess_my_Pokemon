<div class="min-h-screen bg-slate-900 text-white flex flex-col">

  <!-- Header -->
  <header class="flex items-center px-6 py-4 border-b border-slate-700">
    <div class="flex items-center gap-3">
      <!-- Poké Ball SVG -->
      <svg class="w-8 h-8" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="16" cy="16" r="15" stroke="#ef4444" stroke-width="2" fill="none"/>
        <path d="M1 16 Q1 1 16 1" fill="#ef4444"/>
        <path d="M31 16 Q31 1 16 1" fill="#ef4444"/>
        <line x1="1" y1="16" x2="31" y2="16" stroke="#ef4444" stroke-width="2"/>
        <circle cx="16" cy="16" r="5" fill="white" stroke="#ef4444" stroke-width="2"/>
        <circle cx="16" cy="16" r="2.5" fill="#ef4444"/>
      </svg>
      <span class="text-xl font-bold tracking-wide">Guess My Pokémon</span>
    </div>
  </header>

  <!-- Main content -->
  <main class="flex-1 flex items-center justify-center px-4">

    <!-- Loading -->
    <div *ngIf="state === 'loading'" class="flex flex-col items-center gap-4 text-slate-400">
      <svg class="w-10 h-10 animate-spin" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="40 20"/>
      </svg>
      <p>Chargement de l'invitation…</p>
    </div>

    <!-- Error / Full -->
    <div *ngIf="state === 'error' || state === 'full'" class="w-full max-w-md bg-slate-800 border border-slate-700 rounded-2xl p-8 shadow-xl text-center">
      <div class="text-4xl mb-4">⚠️</div>
      <p class="text-slate-300 text-lg">{{ errorMessage }}</p>
      <button
        (click)="decline()"
        class="mt-6 px-6 py-2 rounded-xl border border-slate-600 text-slate-300 hover:bg-slate-700 hover:text-white transition-colors text-sm font-medium"
      >
        Retour à l'accueil
      </button>
    </div>

    <!-- Valid invitation -->
    <div *ngIf="state === 'valid'" class="w-full max-w-md bg-slate-800 border border-slate-700 rounded-2xl p-8 shadow-xl">
      <div class="flex flex-col items-center text-center gap-4">
        <div class="text-4xl">🎮</div>
        <h2 class="text-xl font-semibold">Invitation à jouer&nbsp;!</h2>
        <p class="text-slate-300 leading-relaxed">
          <span class="text-red-400 font-bold">{{ inviterUsername }}</span>
          t'invite à une partie de Guess My Pokémon&nbsp;!
        </p>
        <div class="flex gap-3 mt-4 w-full">
          <button
            (click)="accept()"
            [disabled]="isJoining"
            class="flex-1 py-3 px-4 rounded-xl bg-red-600 hover:bg-red-500 disabled:opacity-50 disabled:cursor-not-allowed font-bold text-white transition-colors shadow-lg"
          >
            <span *ngIf="!isJoining">✅ Accepter</span>
            <span *ngIf="isJoining">Connexion…</span>
          </button>
          <button
            (click)="decline()"
            [disabled]="isJoining"
            class="flex-1 py-3 px-4 rounded-xl border border-slate-600 text-slate-300 hover:bg-slate-700 hover:text-white disabled:opacity-50 disabled:cursor-not-allowed transition-colors font-medium"
          >
            ❌ Refuser
          </button>
        </div>
      </div>
    </div>

  </main>

</div>
