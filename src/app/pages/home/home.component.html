<div class="min-h-screen bg-slate-900 text-white flex flex-col">

  <!-- Header -->
  <header class="flex items-center justify-between px-6 py-4 border-b border-slate-700">
    <div class="flex items-center gap-3">
      <!-- Poké Ball SVG -->
      <svg class="w-8 h-8" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="16" cy="16" r="15" stroke="#ef4444" stroke-width="2" fill="none"/>
        <path d="M1 16 Q1 1 16 1" fill="#ef4444"/>
        <path d="M31 16 Q31 1 16 1" fill="#ef4444"/>
        <line x1="1" y1="16" x2="31" y2="16" stroke="#ef4444" stroke-width="2"/>
        <circle cx="16" cy="16" r="5" fill="white" stroke="#ef4444" stroke-width="2"/>
        <circle cx="16" cy="16" r="2.5" fill="#ef4444"/>
      </svg>
      <span class="text-xl font-bold tracking-wide">Guess My Pokémon</span>
    </div>
    <button
      (click)="logout()"
      class="px-4 py-2 rounded-lg border border-slate-600 text-slate-300 hover:bg-slate-700 hover:text-white transition-colors text-sm font-medium"
    >
      Se déconnecter
    </button>
  </header>

  <!-- Main content -->
  <main class="flex-1 flex flex-col items-center justify-center px-4">
    <h1 class="text-3xl font-bold mb-8 text-center">
      Bienvenue, <span class="text-red-400">{{ isLoadingProfile ? '...' : username }}</span>&nbsp;!
    </h1>

    <div class="w-full max-w-md bg-slate-800 border border-slate-700 rounded-2xl p-8 shadow-xl">
      <div class="flex flex-col items-center text-center gap-4">
        <div class="text-4xl">🎮</div>
        <h2 class="text-xl font-semibold">Prêt à défier un ami&nbsp;?</h2>
        <p class="text-slate-400 text-sm leading-relaxed">
          Crée une partie et invite-le avec un lien.
        </p>
        <button
          (click)="createGame()"
          [disabled]="isCreating"
          class="mt-4 w-full py-3 px-6 rounded-xl bg-red-600 hover:bg-red-500 disabled:opacity-50 disabled:cursor-not-allowed font-bold text-white transition-colors text-base shadow-lg"
        >
          @if (!isCreating) { <span>▶ Créer une partie</span> }
          @if (isCreating) { <span>Création en cours…</span> }
        </button>
        @if (createError) {
          <p class="mt-3 text-sm text-red-400">{{ createError }}</p>
        }
      </div>
    </div>
  </main>

</div>
